<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="admin.title">CACAO - Bảng điều khiển</title>

    <!-- Google Fonts: Inter for text, Genos for display -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Genos:wght@700,900&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- CDNs -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Custom Styles (Light Theme) -->
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #F8F9FA; /* Light Gray */
            color: #212529; /* Dark Gray */
        }
        .font-display { font-family: 'Genos', sans-serif; }

        .cacao-card {
            background-color: #FFFFFF;
            border: 1px solid #E5E7EB; /* Gray 200 */
            border-radius: 0.75rem; /* 12px */
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
        }

        .cacao-interactive-card:hover { 
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.07), 0 4px 6px -4px rgba(0, 0, 0, 0.07);
        }

        /* Toggles */
        .toggle-label { background-color: #A0AEC0; }
        .toggle-checkbox:checked + .toggle-label { background-color: #E07A5F; }
        .toggle-knob { transform: translateX(0); }
        input:checked ~ .toggle-knob { transform: translateX(1rem); }

        /* SweetAlert2 */
        .swal2-popup { font-family: 'Inter', sans-serif !important; }
        .swal2-title { font-family: 'Genos', sans-serif !important; }
    </style>
</head>
<body id="admin-app-body" class="hidden min-h-screen p-4 sm:p-6 lg:p-8 text-base">
    <!-- Guard Screen -->
    <div id="admin-guard-screen" class="fixed inset-0 z-[200] flex items-center justify-center bg-gray-50">
        <div class="text-center p-8">
            <p class="text-xl font-bold text-gray-700 font-display animate-pulse" data-i18n="admin.guard.loading">Đang xác thực quyền admin...</p>
        </div>
    </div>

    <!-- Header -->
    <header class="flex flex-wrap items-center justify-between mb-8 gap-4">
        <h1 class="text-5xl font-black uppercase font-display text-gray-800" data-i18n="admin.title">Admin</h1>
        <div class="flex items-center space-x-4">
            <div id="user-menu" class="hidden items-center">
                <p class="mr-4 text-gray-700"><span data-i18n="admin.header.user">Xin chào,</span> <span id="user-name" class="font-bold"></span></p>
                <a href="/index.html" class="font-bold py-2 px-4 rounded-lg text-sm bg-white border border-gray-300 hover:bg-gray-100 transition-colors">FEED</a>
                <button id="logout-btn" data-i18n="logout" class="ml-2 font-bold py-2 px-4 rounded-lg text-sm bg-red-500 text-white hover:bg-red-600 transition-colors">Thoát</button>
            </div>
            <div class="lang-switcher flex items-center space-x-1 bg-white border border-gray-300 rounded-full p-1">
                <button data-lang="vi" onclick="changeLanguage('vi')" class="px-3 py-1 rounded-full text-sm font-bold text-gray-500 hover:bg-gray-100 hover:text-gray-800 transition-colors">VI</button>
                <button data-lang="en" onclick="changeLanguage('en')" class="px-3 py-1 rounded-full text-sm font-bold text-gray-500 hover:bg-gray-100 hover:text-gray-800 transition-colors">EN</button>
            </div>
        </div>
    </header>

    <main class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <!-- Stats -->
        <div class="cacao-card p-6"><p class="text-sm font-bold text-gray-500 uppercase tracking-wider" data-i18n="admin.stats.total_users">Tổng User</p><p id="total-users-stat" class="text-5xl font-display font-black text-gray-800">0</p></div>
        <div class="cacao-card p-6"><p class="text-sm font-bold text-gray-500 uppercase tracking-wider" data-i18n="admin.stats.total_mentors">Tổng Mentor</p><p id="total-mentors-stat" class="text-5xl font-display font-black text-gray-800">0</p></div>
        <div class="cacao-card p-6"><p class="text-sm font-bold text-gray-500 uppercase tracking-wider" data-i18n="admin.stats.pending_courses">Bài chờ duyệt</p><p id="pending-courses-stat" class="text-5xl font-display font-black text-orange-500">0</p></div>
        
        <!-- Chart -->
        <div class="lg:col-span-3 cacao-card p-6"><canvas id="revenue-chart"></canvas></div>

        <!-- Main Columns -->
        <div class="lg:col-span-2 space-y-6">
            <div class="cacao-card p-6">
                <h2 class="text-xl font-bold mb-4 uppercase text-gray-700 font-display" data-i18n="admin.approval.title">Duyệt bài giảng</h2>
                <div id="pending-courses-list" class="space-y-4 max-h-96 overflow-y-auto pr-2"></div>
            </div>
            <div class="cacao-card p-6">
                <h2 class="text-xl font-bold mb-4 uppercase text-gray-700 font-display" data-i18n="admin.reports.title">Hòm thư Vi phạm</h2>
                <div id="reports-list" class="space-y-4 max-h-96 overflow-y-auto pr-2"></div>
            </div>
        </div>

        <!-- Sidebar -->
        <div class="lg:col-span-1 space-y-6">
            <div class="cacao-card p-6">
                <h2 class="text-xl font-bold mb-4 uppercase text-gray-700 font-display" data-i18n="admin.toggles.title">Cấu hình Hệ thống</h2>
                <div class="space-y-5">
                    <div class="flex items-center justify-between"><span class="font-medium" data-i18n="admin.toggles.maintenance">Chế độ Bảo trì</span>
                         <label class="relative flex items-center cursor-pointer"><input type="checkbox" id="maintenance-mode-toggle" class="toggle-checkbox sr-only"><div class="toggle-switch w-10 h-6 bg-gray-300 rounded-full transition-colors ease-in-out"></div><div class="toggle-knob absolute left-1 top-1 w-4 h-4 bg-white rounded-full shadow transition-transform duration-200 ease-in-out"></div></label>
                    </div>
                    <div class="flex items-center justify-between"><span class="font-medium" data-i18n="admin.toggles.approval">Bắt buộc Duyệt bài</span>
                         <label class="relative flex items-center cursor-pointer"><input type="checkbox" id="approval-mode-toggle" class="toggle-checkbox sr-only"><div class="toggle-switch w-10 h-6 bg-gray-300 rounded-full transition-colors ease-in-out"></div><div class="toggle-knob absolute left-1 top-1 w-4 h-4 bg-white rounded-full shadow transition-transform duration-200 ease-in-out"></div></label>
                    </div>
                </div>
            </div>
            <div class="cacao-card p-6">
                <h2 class="text-xl font-bold mb-4 uppercase text-gray-700 font-display" data-i18n="admin.logs.title">Nhật ký Hệ thống</h2>
                <div id="audit-log-timeline" class="space-y-4 text-sm max-h-[28rem] overflow-y-auto pr-2 text-gray-600"></div>
            </div>
        </div>
    </main>

    <!-- JS Modules -->
    <script type="module" src="./js/lang.js"></script>
    <script type="module" src="./js/admin-app.js"></script>
</body>
</html>
