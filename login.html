<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CACAO - Đăng nhập</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
        <h2 class="font-bold text-3xl text-center mb-3 text-gray-800 uppercase tracking-wide">Đăng nhập</h2>
        <p class="text-gray-600 text-center text-base mb-6 font-medium">Chào mừng bạn quay lại với CACAO!</p>

        <!-- Email/Password Form -->
        <form id="login-form" class="space-y-5">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
                <input type="email" id="email" name="email" required
                    class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-[#E07A5F] focus:border-[#E07A5F]">
            </div>
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700">Mật khẩu</label>
                <input type="password" id="password" name="password" required
                    class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-[#E07A5F] focus:border-[#E07A5F]">
            </div>
            <div id="login-error" class="text-red-500 text-sm hidden"></div>
            <div>
                <button type="submit" id="login-button"
                    class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-[#E07A5F] hover:bg-[#d46a4d] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[#E07A5F]">
                    Đăng nhập
                </button>
            </div>
        </form>

        <div class="my-6">
            <div class="relative">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-gray-300"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-2 bg-white text-gray-500">hoặc đăng nhập với</span>
                </div>
            </div>
        </div>

        <!-- Social Login Buttons -->
        <div class="space-y-3">
            <button id="google-login"
                class="w-full flex items-center justify-center px-4 py-2 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50">
                <img class="h-5 w-5 mr-2" src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google">
                Đăng nhập với Google
            </button>
            <button id="facebook-login"
                class="w-full flex items-center justify-center px-4 py-2 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50">
                <img class="h-5 w-5 mr-2" src="https://www.svgrepo.com/show/448224/facebook.svg" alt="Facebook">
                Đăng nhập với Facebook
            </button>
            <button id="github-login"
                class="w-full flex items-center justify-center px-4 py-2 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50">
                <img class="h-5 w-5 mr-2" src="https://www.svgrepo.com/show/475654/github-color.svg" alt="GitHub">
                Đăng nhập với GitHub
            </button>
        </div>
        
        <div class="text-center mt-6">
            <p class="text-sm text-gray-600">
                Chưa có tài khoản?
                <a href="#" class="font-bold text-[#E07A5F] hover:underline">Đăng ký ngay</a>
            </p>
        </div>

    </div>

    <!-- JS Module -->
    <script type="module" src="./js/login-app.js"></script>
</body>

</html>
