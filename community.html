<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cộng đồng — CACAO</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Genos:wght@700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- CDNs -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Custom Styles -->
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F4F7F6; color: #1a202c; }
        .font-display { font-family: 'Genos', sans-serif; }
        .btn-primary { background-color: #E07A5F; color: white; transition: background-color 0.2s; border-radius: 0.5rem; font-weight: 700; }
        .btn-primary:hover { background-color: #d46a4d; }
        .modal-backdrop { background-color: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px); }
        .group-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem; border-radius: 0.5rem; cursor: pointer; transition: background-color 0.2s; border: 2px solid transparent; }
        .group-item:hover { background-color: #E2E8F0; }
        .group-item.active { background-color: #FFFFFF; border-color: #E07A5F; }
        .post-item { background-color: #FFFFFF; padding: 1rem; border-radius: 0.5rem; border: 1px solid #E2E8F0; }
    </style>
</head>
<body class="p-4 sm:p-6 lg:p-8">

    <header class="flex flex-wrap justify-between items-center mb-8 gap-4">
        <a href="index.html" class="text-4xl font-display font-bold tracking-wider text-gray-800">CACAO</a>
        <div class="flex items-center gap-4">
            <a href="mentor.html" id="mentor-link" class="font-bold text-lg text-gray-600 hover:text-orange-500 hidden">Kênh Mentor</a>
            <button id="create-group-modal-btn" class="btn-primary py-2 px-5 text-base uppercase">+ Tạo Nhóm</button>
        </div>
    </header>

    <main class="grid grid-cols-1 md:grid-cols-12 gap-8">
        <!-- Group List -->
        <aside class="md:col-span-4 lg:col-span-3 bg-white p-4 rounded-xl shadow-sm">
            <h2 id="group-list-title" class="text-xl font-bold mb-4 text-gray-700">Các nhóm</h2>
            <div id="group-list" class="space-y-2"></div>
        </aside>

        <!-- Group Feed -->
        <section class="md:col-span-8 lg:col-span-9">
            <div id="group-feed-placeholder" class="text-center py-20">
                <p class="text-gray-500 text-lg">Chọn một nhóm để xem thảo luận hoặc tạo nhóm mới.</p>
            </div>
            <div id="group-feed-container" class="hidden space-y-6">
                <div class="bg-white p-6 rounded-xl shadow-sm">
                    <h2 id="feed-group-name" class="text-2xl font-bold mb-4 text-gray-800"></h2>
                    <form id="create-post-form">
                        <textarea name="content" placeholder="Chia sẻ điều gì đó với nhóm..." required class="w-full bg-gray-50 p-3 rounded-md border-2 border-gray-200 focus:border-orange-400 focus:ring-0 outline-none transition h-28"></textarea>
                        <div class="text-right mt-2">
                            <button type="submit" class="btn-primary py-2 px-6 text-sm uppercase">Đăng bài</button>
                        </div>
                    </form>
                </div>
                <div id="posts-container" class="space-y-4"></div>
            </div>
        </section>
    </main>

    <!-- Create Group Modal -->
    <div id="create-group-modal" class="fixed inset-0 modal-backdrop items-center justify-center p-4 hidden">
        <div class="bg-white rounded-xl p-8 shadow-2xl w-full max-w-md m-4">
            <h2 class="text-2xl font-bold mb-6 text-gray-800">Tạo Nhóm Mới</h2>
            <form id="create-group-form" class="flex flex-col gap-4">
                <input type="text" name="name" placeholder="Tên nhóm" required class="p-3 rounded-md border-2 border-gray-300 focus:border-orange-400 focus:ring-0 outline-none">
                <textarea name="description" placeholder="Mô tả nhóm" required class="p-3 rounded-md border-2 border-gray-300 focus:border-orange-400 focus:ring-0 outline-none"></textarea>
                <input type="url" name="avatar_url" placeholder="URL Ảnh đại diện (tùy chọn)" class="p-3 rounded-md border-2 border-gray-300 focus:border-orange-400 focus:ring-0 outline-none">
                <div class="flex justify-end gap-3 mt-4">
                    <button type="button" id="cancel-create-group" class="font-bold py-2 px-5 rounded-lg text-gray-600 bg-gray-100 hover:bg-gray-200">Hủy</button>
                    <button type="submit" class="btn-primary py-2 px-5">Tạo Nhóm</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="./js/community-app.js"></script>
</body>
</html>
